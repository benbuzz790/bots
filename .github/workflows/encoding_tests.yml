# GitHub Actions workflow for encoding regression tests
name: Encoding Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  encoding-tests:
    name: Encoding Tests on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run PowerShell subprocess encoding tests
      run: |
        pytest tests/test_subprocess_encoding.py -v --tb=short

    - name: Run file I/O unicode tests
      run: |
        pytest tests/test_file_io_unicode.py -v --tb=short

    - name: Run git unicode tests
      run: |
        pytest tests/test_git_unicode.py -v --tb=short

    - name: Run console encoding tests
      run: |
        pytest tests/test_console_encoding.py -v --tb=short

    - name: Run all encoding tests with coverage
      run: |
        pytest tests/test_subprocess_encoding.py tests/test_file_io_unicode.py tests/test_git_unicode.py tests/test_console_encoding.py --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: encoding-tests
        name: encoding-coverage-${{ matrix.os }}-${{ matrix.python-version }}
