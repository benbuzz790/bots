name: Fast Checks
on: [push, pull_request]
permissions:
  contents: read
jobs:
  fast-checks:
    name: Fast Checks (Linting & Unit Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black isort flake8 pytest pytest-xdist
      - name: Check Black formatting (non-blocking)
        run: |
          black --check --diff . || echo "::warning::Black formatting issues found"
        continue-on-error: true
      - name: Check isort import sorting (non-blocking)
        run: |
          isort --check-only --diff . || echo "::warning::isort issues found"
        continue-on-error: true
      - name: Run flake8 linting (non-blocking)
        run: |
          flake8 . --count --statistics --show-source || echo "::warning::flake8 issues found"
        continue-on-error: true
      - name: Run fast unit tests
        run: |
          pytest tests/unit/ -v -n auto -m "not slow and not integration and not api" --maxfail=3
